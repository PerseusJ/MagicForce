# =====================================================================
#  MagicForce — main configuration
# ---------------------------------------------------------------------
#  Every value here ships with a default that matches the original
#  hardcoded behavior. Server owners can tune them freely without
#  recompiling. Invalid values (negative mana, charge time < 1, ...)
#  will be rejected at load time and the corresponding default will
#  be used instead, with a warning logged to the server console.
# =====================================================================

# ── Mana system ──────────────────────────────────────────────────────
mana:
  # Maximum mana a player can hold.
  max: 100.0

  # Mana regenerated per second while holding a grimoire in the main hand.
  grimoire-regen: 5.0

  # Mana regenerated per second with no grimoire equipped.
  normal-regen: 2.0

  # How often (in ticks, 20 = 1s) the action-bar mana HUD is refreshed.
  hud-interval: 10

# ── Chanting ─────────────────────────────────────────────────────────
chanting:
  # How many ticks a fully-charged spell can be held before it fizzles.
  # 100 ticks = 5 seconds.
  hold-window-ticks: 100

  # How often (in ticks) the looping charge sound is replayed.
  loop-sound-interval: 10

# ── Inscription tables ───────────────────────────────────────────────
inscription:
  # XP-level cost to inscribe a scroll of the given tier.
  tier-costs:
    1: 5
    2: 15
    3: 30

# ── Grimoires ────────────────────────────────────────────────────────
grimoire:
  # Number of scroll slots per grimoire tier.
  capacities:
    1: 2
    2: 4
    3: 6

# ── Spells ───────────────────────────────────────────────────────────
